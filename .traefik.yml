displayName: SSO Bridge Plugin
type: middleware

import: github.com/Ariesly/traefik-plugin-sso-bridge

summary: 'Legacy SSO authentication middleware for Traefik with CST token support'

testData:
  secretKey: "TestKey8"
  cookieName: "SSO_AUTH_TICKET"
  cstTokenName: "cst"
  cookieSecret: "12345678901234567890123456789012"
  ssoLoginUrl: "http://sso.example.com/Login.aspx"
  ticketServiceUrl: "http://sso.example.com/Ticket.asmx"
  serviceId: "test_service"
  cookieDomain: ".example.com"
  cookieSecure: false
  cookieMaxAge: 28800
  soapAction: "http://sso.indigox.net/ValidateServiceTicket"
  soapNamespace: "http://sso.indigox.net/"
  authHeaders: ["X-Auth-User", "X-Auth-ID"]
